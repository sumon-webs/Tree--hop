<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Daisy ui and tailwind cdn-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Tree online shop</title>
</head>

<body>
    <nav class="bg-[#15803D]">
        <div class="navbar  max-w-screen-2xl mx-auto">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content  rounded-box z-1 mt-3 w-52 p-2  text-green-300 font-bold space-y-3">
                        <li>About</li>
                        <li>Gallery</li>
                        <li>Plant a tree</li>
                    </ul>
                </div>
                <a class=" text-3xl text-gray-100 font-bold">Green Earth</a>
            </div>
            <div class="navbar-center hidden lg:flex">
                <ul class="menu menu-horizontal px-1 space-x-5 text-gray-200 font-bold  ">
                    <li>About</li>
                    <li>Gallery</li>
                    <li>Plant a tree</li>
                </ul>
            </div>
            <div class="navbar-end">
                <a class="btn btn-warning rounded-full">Plant a Tree</a>
            </div>
        </div>
    </nav>

    <header class="  bg-[#CFF0DC]">
        <div class="flex max-w-screen-2xl mx-auto">
            <div>
                <img src="./assets/hero-leaf1.png" alt="">
            </div>
            <div class=" flex flex-col justify-center text-center space-y-4 items-center">
                <h1 class=" text-start text-4xl font-bold">Plant a Tree, Grow a Future</h1>
                <p>Join our mission to plant 1 million trees and make the Earth greener for future generations.</p>
                <a class="btn btn-warning rounded-full">Get involved</a>
            </div>
            <div>
                <img src="./assets/hero-leaf2.png" alt="">
            </div>
        </div>
    </header>

    <main class=" bg-[#F0FDF4]">
        <section class=" max-w-screen-2xl mx-auto pt-18 ">
            <h1 class=" text-center text-black text-4xl font-semibold mb-12">Chose Your Trees</h1>
            <div id="loading-section" class=" flex justify-center hidden">
                <span class="loading loading-dots loading-xl"></span>
            </div>
            <div class=" grid grid-cols-12 text-center">
                <div class=" text-start col-span-2 space-y-3 st">
                    <h1 class=" font-semibold text-2xl">Categories</h1>
                    <button onclick="treesLoading()">All</button>
                    <div id="category-container" class=" flex flex-col items-start space-y-3">

                    </div>
                </div>
                <div class=" col-span-8">
                    <div id="trees-section" class=" grid grid-cols-3 gap-3">

                    </div>
                    <div class=" col-span-2">
                    </div>
                </div>
        </section>

        <section>
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
            <dialog id="tree_modal" class="modal modal-bottom sm:modal-middle">
                <div id="modal-box" class="modal-box space-y-3">
                    <h3 id="plant-name" class="text-2xl font-bold"></h3>
                    <img id="plant-image" class=" h-48 w-full object-cover rounded-sm" src="./assets/hero-leaf1.png" alt="">
                    <p id="plant-category" class=" font-bold">Category: <span class=" badge badge-soft badge-success font-normal">Fruit tree</span></p>
                    <p id="plant-description" class=""></p>
                    <p  class=" font-bold"><i class="fa-solid fa-bangladeshi-taka-sign"></i><span id="plant-amount"></span></p>
                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn">Close</button>
                    </div>
                </div>
            </dialog>
        </section>
    </main>

    <script src="./index.js"></script>
</body>

</html>
